interface:
  display_name: "Publish gate (Telegram approval)"
  short_description: "Queue email, X, Nostr, or workout-write drafts; Mauro approves on Telegram; host executes only after approve. Read docs/public-write-gates.md."
  default_prompt: "For any outbound write (email, X, Nostr, workout Notion writes), use publish-gate-confirm enqueue scripts only; never gog gmail send, nak event/publish, xurl post, or direct Notion write APIs from the agent. Reads use read-only tools per TOOLS.md."

policy:
  allow_implicit_invocation: true
